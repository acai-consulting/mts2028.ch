# HTML before the closing </head>
[params]
customHead = """
<style>
  .hero-area .counter {
    background: rgba(0, 0, 0, 0.7);
    border-radius: 8px;
  }
  .hero-area .counter ul li {
    background-color: rgba(0, 30, 60, 0.85);
    color: #ffffff;
  }
  .hero-area .counter ul li .digit {
    color: #87CEFA;
    text-shadow: 0 0 10px rgba(135, 206, 250, 0.6);
  }
  .hero-area .counter ul li span.dash_title {
    color: #ffffff;
    font-weight: 600;
  }
</style>
"""

